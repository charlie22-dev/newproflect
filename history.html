<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History - Mimalicious</title>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #D62300;
      --accent: #F5AF19;
      --bg-light: #F2EBD9;
      --text-dark: #502314;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-light); color: var(--text-dark); font-family: 'Montserrat', sans-serif; padding-top: 92px; }
    h1, .logo, .nav-links a, .nav-button, .section-title, .order-id { font-family: 'Lilita One', cursive; }

    .navbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto minmax(180px, 1fr);
      align-items: center;
      column-gap: 1.5rem;
      padding: 1rem 8%;
      background: var(--primary);
      border-bottom: 6px solid var(--accent);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
    }

    .logo { font-size: 2.2rem; color: var(--accent); text-shadow: 2px 2px 0 var(--text-dark); text-decoration: none; justify-self: start; line-height: 1; white-space: nowrap; }
    .nav-links { list-style: none; display: flex; gap: 2rem; justify-self: center; align-items: center; }
    .nav-links a { text-decoration: none; color: var(--white); text-transform: uppercase; font-size: 1.1rem; display: inline-flex; align-items: center; height: 44px; }
    .nav-links a:hover { color: var(--accent); }

    .nav-button {
      text-decoration: none;
      background: var(--accent);
      color: var(--text-dark);
      padding: 0 1.6rem;
      border-radius: 16px;
      border: 3px solid var(--text-dark);
      box-shadow: 4px 4px 0 var(--text-dark);
      text-transform: uppercase;
      justify-self: end;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 130px;
      height: 44px;
      transition: background-color 0.2s, color 0.2s;
    }
    .nav-button:hover { background: var(--white); }
    .nav-button:active { transform: none; }

    main { padding: 3rem 8%; max-width: 1100px; margin: 0 auto; }
    .section-title { font-size: 3rem; color: var(--primary); margin-bottom: 1.5rem; text-transform: uppercase; }
    .orders-container { display: grid; gap: 1rem; }

    .order-card {
      background: var(--white);
      border: 4px solid var(--text-dark);
      border-radius: 16px;
      box-shadow: 8px 8px 0 var(--accent);
      overflow: hidden;
    }

    .order-card summary {
      list-style: none;
      padding: 1rem;
      cursor: pointer;
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr auto;
      gap: 0.7rem;
      align-items: center;
      background: #fff9ee;
    }

    .order-card summary::-webkit-details-marker { display: none; }
    .order-meta { font-size: 0.9rem; font-weight: 700; color: #7b6247; }
    .order-value { font-weight: 800; font-size: 1rem; }
    .right-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 0.35rem; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 110px;
      height: 30px;
      border: 2px solid var(--text-dark);
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 900;
      text-transform: uppercase;
      padding: 0 0.7rem;
    }
    .card-action-btn {
      min-width: 110px;
      height: 32px;
      border: 2px solid var(--text-dark);
      border-radius: 10px;
      background: #fff;
      color: var(--text-dark);
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
    }
    .card-action-btn:hover { background: var(--accent); }
    .status-pending { background: #ffe08a; color: #4b3900; }
    .status-preparing { background: #b9e6ff; color: #003a5a; }
    .status-delivered { background: #c8f3ce; color: #154d1d; }
    .status-cancelled { background: #ffc9c9; color: #5b1717; }

    .order-items-wrap { border-top: 2px dashed #d9c8ab; padding: 1rem; }
    .order-items-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }
    .status-select {
      height: 34px;
      border: 2px solid var(--text-dark);
      border-radius: 10px;
      background: #fff;
      font-weight: 800;
      color: var(--text-dark);
      padding: 0 0.55rem;
      font-family: 'Montserrat', sans-serif;
    }
    .items-table { width: 100%; border-collapse: collapse; }
    .items-table th, .items-table td { text-align: left; padding: 0.6rem 0.4rem; border-bottom: 1px solid #efe3cf; }
    .items-table th { text-transform: uppercase; font-size: 0.8rem; color: #73583f; }
    .items-table td { font-size: 0.95rem; font-weight: 700; }
    .empty-state {
      background: var(--white);
      border: 4px solid var(--text-dark);
      border-radius: 16px;
      box-shadow: 8px 8px 0 var(--accent);
      padding: 1.2rem;
      font-weight: 700;
    }

    .footer-bottom {
      border-top: 2px solid var(--white);
      padding: 2rem;
      text-align: center;
      font-weight: 800;
      font-size: 0.9rem;
      color: #888;
      text-transform: uppercase;
    }

    @media (max-width: 860px) {
      .navbar { grid-template-columns: 1fr; row-gap: 0.7rem; padding: 1rem 5%; }
      .logo, .nav-links, .nav-button { justify-self: center; }
      .nav-links { gap: 1rem; flex-wrap: wrap; justify-content: center; }
      main { padding: 2rem 5%; }
      .section-title { font-size: 2.2rem; }
      .order-card summary { grid-template-columns: 1fr; }
      .right-actions { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="#" class="logo">MIMALICIOUS</a>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact us.html">Contact</a></li>
      <li><a href="history.html">History</a></li>
    </ul>
    <a class="nav-button" href="index.html" onclick="return logoutAndResetHistory(event)">Logout</a>
  </nav>

  <main>
    <h1 class="section-title">Order History</h1>
    <div id="orders-container" class="orders-container"></div>
  </main>

  <footer class="footer-bottom">
    <p>&copy; 2026 MIMALICIOUS. ALL RIGHTS RESERVED. WAG KANG MAGPAPAGUTOM!</p>
  </footer>

  <script>
    const ORDER_HISTORY_KEY = "mimaliciousOrderHistory";
    const ORDER_STATUSES = ["Pending", "Preparing", "Delivered", "Cancelled"];
    const ordersContainer = document.getElementById("orders-container");
    let lastRawHistory = null;

    function logoutAndResetHistory(event) {
      if (event) event.preventDefault();
      localStorage.removeItem(ORDER_HISTORY_KEY);
      sessionStorage.removeItem(ORDER_HISTORY_KEY);
      window.location.href = "index.html";
      return false;
    }

    function loadOrders() {
      try {
        const raw = sessionStorage.getItem(ORDER_HISTORY_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function formatDate(isoDate) {
      if (!isoDate) return "N/A";
      const dateObj = new Date(isoDate);
      if (Number.isNaN(dateObj.getTime())) return "N/A";
      return dateObj.toLocaleString();
    }

    function formatPeso(value) {
      return "₱" + Number(value || 0).toFixed(2);
    }

    function calculateTotal(items) {
      return items.reduce(function (sum, item) {
        return sum + (Number(item.price || 0) * Number(item.quantity || item.qty || 0));
      }, 0);
    }

    function normalizeStatus(status) {
      return ORDER_STATUSES.includes(status) ? status : "Pending";
    }

    function statusClass(status) {
      const normalized = normalizeStatus(status).toLowerCase();
      return "status-" + normalized;
    }

    function updateOrderStatus(orderIndex, newStatus) {
      const orders = loadOrders();
      if (!orders[orderIndex]) return;
      orders[orderIndex].status = normalizeStatus(newStatus);
      const updatedRaw = JSON.stringify(orders);
      sessionStorage.setItem(ORDER_HISTORY_KEY, updatedRaw);
      lastRawHistory = updatedRaw;
      renderOrderHistory();
    }

    function toggleOrderDetails(event, detailsId) {
      event.preventDefault();
      event.stopPropagation();
      const details = document.getElementById(detailsId);
      if (!details) return;
      details.open = !details.open;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderOrderHistory() {
      const orders = loadOrders();
      if (orders.length === 0) {
        ordersContainer.innerHTML = '<div class="empty-state">No orders yet. Your first order will show up here.</div>';
        return;
      }

      const cards = [];
      for (let i = orders.length - 1; i >= 0; i -= 1) {
        const order = orders[i] || {};
        const items = Array.isArray(order.items) ? order.items : [];
        const itemCount = items.reduce(function (sum, item) {
          return sum + Number(item.quantity || item.qty || 0);
        }, 0);
        const total = Number(order.total || 0) > 0 ? Number(order.total) : calculateTotal(items);
        const status = normalizeStatus(order.status);
        const itemRows = items.map(function (item) {
          const itemName = escapeHtml(item.item || item.name || "Unknown Item");
          const size = escapeHtml(item.size || "-");
          const qty = Number(item.quantity || item.qty || 0);
          const price = formatPeso(item.price || 0);
          const subtotal = formatPeso(Number(item.price || 0) * qty);
          return "<tr><td>" + itemName + "</td><td>" + size + "</td><td>" + qty + "</td><td>" + price + "</td><td>" + subtotal + "</td></tr>";
        }).join("");
        const statusOptions = ORDER_STATUSES.map(function (itemStatus) {
          const selected = itemStatus === status ? " selected" : "";
          return "<option value=\"" + itemStatus + "\"" + selected + ">" + itemStatus + "</option>";
        }).join("");

        cards.push(
          "<details class=\"order-card\" id=\"order-details-" + i + "\">" +
            "<summary>" +
              "<div><div class=\"order-id\">Order #" + (i + 1) + "</div><div class=\"order-meta\">" + formatDate(order.date) + "</div></div>" +
              "<div><div class=\"order-meta\">Items</div><div class=\"order-value\">" + itemCount + "</div></div>" +
              "<div><div class=\"order-meta\">Total</div><div class=\"order-value\">" + formatPeso(total) + "</div></div>" +
              "<div class=\"right-actions\">" +
                "<span class=\"status-badge " + statusClass(status) + "\">" + status + "</span>" +
                "<button type=\"button\" class=\"card-action-btn\" onclick=\"toggleOrderDetails(event, 'order-details-" + i + "')\">View Items</button>" +
              "</div>" +
            "</summary>" +
            "<div class=\"order-items-wrap\">" +
              "<div class=\"order-items-header\"><strong>Status</strong><select class=\"status-select\" onchange=\"updateOrderStatus(" + i + ", this.value)\">" + statusOptions + "</select></div>" +
              "<table class=\"items-table\">" +
                "<thead><tr><th>Item</th><th>Size</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr></thead>" +
                "<tbody>" + (itemRows || "<tr><td colspan=\"5\">No items in this order.</td></tr>") + "</tbody>" +
              "</table>" +
            "</div>" +
          "</details>"
        );
      }

      ordersContainer.innerHTML = cards.join("");
    }

    function syncIfChanged() {
      const raw = sessionStorage.getItem(ORDER_HISTORY_KEY);
      if (raw !== lastRawHistory) {
        lastRawHistory = raw;
        renderOrderHistory();
      }
    }

    window.addEventListener("storage", function (event) {
      if (event.key === ORDER_HISTORY_KEY) {
        lastRawHistory = event.newValue;
        renderOrderHistory();
      }
    });

    document.addEventListener("visibilitychange", function () {
      if (!document.hidden) syncIfChanged();
    });

    setInterval(syncIfChanged, 1200);
    syncIfChanged();
    window.updateOrderStatus = updateOrderStatus;
    window.toggleOrderDetails = toggleOrderDetails;
    window.logoutAndResetHistory = logoutAndResetHistory;
  </script>
</body>
</html>
