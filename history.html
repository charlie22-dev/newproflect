<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History — Mimalicious</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { padding-top:96px; }
    main { padding:3rem 6%; max-width:1100px; margin:0 auto; }
    .history-header { margin-bottom:2.5rem; }
    .history-header h1 { font-family:var(--font-display); font-size:clamp(2.2rem,5vw,3.5rem); color:var(--red); text-transform:uppercase; letter-spacing:0.04em; }
    .history-header p { font-weight:600; color:var(--brown-mid); margin-top:0.4rem; }
    .orders-container { display:grid; gap:1rem; }
    .order-card { background:var(--white); border:3.5px solid var(--brown); border-radius:18px; box-shadow:7px 7px 0 var(--yellow); overflow:hidden; transition:transform 250ms var(--ease-out),box-shadow 250ms var(--ease-out); }
    .order-card:hover { transform:translateY(-3px); box-shadow:10px 12px 0 var(--yellow); }
    .order-card summary { list-style:none; padding:1rem 1.2rem; cursor:pointer; display:grid; grid-template-columns:1.2fr 1fr 1fr auto; gap:0.7rem; align-items:center; background:#fffdf5; border-radius:14px 14px 0 0; }
    .order-card summary::-webkit-details-marker { display:none; }
    .order-id { font-family:var(--font-display); font-size:1.1rem; color:var(--red); letter-spacing:0.04em; }
    .order-meta { font-size:0.85rem; font-weight:700; color:var(--brown-mid); }
    .order-value { font-weight:800; font-size:1rem; color:var(--brown); }
    .right-actions { display:flex; flex-direction:column; align-items:flex-end; gap:0.4rem; }
    .status-badge { display:inline-flex; align-items:center; justify-content:center; min-width:100px; height:28px; border:2px solid var(--brown); border-radius:999px; font-size:0.75rem; font-weight:900; text-transform:uppercase; padding:0 0.7rem; letter-spacing:0.04em; }
    .card-action-btn { min-width:100px; height:30px; border:2px solid var(--brown); border-radius:10px; background:var(--cream); color:var(--brown); font-size:0.72rem; font-weight:900; text-transform:uppercase; cursor:pointer; font-family:var(--font-body); transition:background 180ms var(--ease-out); }
    .card-action-btn:hover { background:var(--yellow); }
    .status-pending { background:#ffe08a; color:#4b3900; }
    .status-preparing { background:#b9e6ff; color:#003a5a; }
    .status-delivered { background:#c8f3ce; color:#154d1d; }
    .status-cancelled { background:#ffc9c9; color:#5b1717; }
    .order-items-wrap { border-top:2px dashed rgba(59,26,8,0.15); padding:1rem 1.2rem; }
    .order-items-header { display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:0.8rem; flex-wrap:wrap; }
    .status-select { height:32px; border:2px solid var(--brown); border-radius:10px; background:var(--white); font-weight:800; color:var(--brown); padding:0 0.5rem; font-family:var(--font-body); }
    .items-table { width:100%; border-collapse:collapse; }
    .items-table th,.items-table td { text-align:left; padding:0.55rem 0.4rem; border-bottom:1px solid rgba(59,26,8,0.08); }
    .items-table th { text-transform:uppercase; font-size:0.75rem; color:var(--brown-mid); font-weight:800; }
    .items-table td { font-size:0.9rem; font-weight:700; }
    .empty-state { background:var(--white); border:3.5px solid var(--brown); border-radius:18px; box-shadow:7px 7px 0 var(--yellow); padding:3rem; text-align:center; }
    .empty-state h3 { font-family:var(--font-display); font-size:2rem; color:var(--red); margin-bottom:0.8rem; letter-spacing:0.04em; }
    .empty-state p { font-weight:600; color:var(--brown-mid); margin-bottom:1.5rem; }
    .empty-icon { font-size:4rem; margin-bottom:1rem; display:block; }
    @media(max-width:768px) { .order-card summary{grid-template-columns:1fr;} .right-actions{align-items:flex-start;} }
  </style>
</head>
<body>
<nav class="navbar" id="mainNav">
  <a href="home.html" class="logo">MIMALICIOUS</a>
  <ul class="nav-links">
    <li><a href="home.html" id="nav-home">HOME</a></li>
    <li><a href="menu.html" id="nav-menu">MENU</a></li>
    <li><a href="about.html" id="nav-about">ABOUT</a></li>
    <li><a href="contact us.html" id="nav-contact">CONTACT</a></li>
    <li><a href="history.html" class="active" id="nav-history">HISTORY</a></li>
  </ul>
  <a class="nav-button" href="index.html" onclick="return logoutAndResetHistory(event)" id="logout-btn">LOGOUT</a>
</nav>

<main>
  <div class="history-header reveal">
    <h1>Order History</h1>
    <p>Track every sizzling order you've placed.</p>
  </div>
  <div id="orders-container" class="orders-container"></div>
</main>

<footer style="background:var(--brown);border-top:4px solid var(--yellow);padding:2rem 6%;text-align:center;">
  <p style="font-size:0.82rem;font-weight:700;color:rgba(245,237,214,0.45);text-transform:uppercase;letter-spacing:0.06em;">&copy; 2026 MIMALICIOUS. ALL RIGHTS RESERVED. WAG KANG MAGPAPAGUTOM!<br>DEVELOPED BY PROGRAMIZ</p>
</footer>

<script>
const ORDER_HISTORY_KEY="mimaliciousOrderHistory";
const ORDER_STATUSES=["Pending","Preparing","Delivered","Cancelled"];
const ordersContainer=document.getElementById("orders-container");
let lastRawHistory=null;

function logoutAndResetHistory(e){if(e)e.preventDefault();localStorage.removeItem(ORDER_HISTORY_KEY);sessionStorage.removeItem(ORDER_HISTORY_KEY);window.location.href="index.html";return false;}
function loadOrders(){try{const raw=sessionStorage.getItem(ORDER_HISTORY_KEY);const parsed=raw?JSON.parse(raw):[];return Array.isArray(parsed)?parsed:[];}catch(e){return[];}}
function formatDate(d){if(!d)return"N/A";const o=new Date(d);return isNaN(o.getTime())?"N/A":o.toLocaleString();}
function formatPeso(v){return"₱"+Number(v||0).toFixed(2);}
function calculateTotal(items){return items.reduce((s,i)=>s+(Number(i.price||0)*Number(i.quantity||i.qty||0)),0);}
function normalizeStatus(s){return ORDER_STATUSES.includes(s)?s:"Pending";}
function statusClass(s){return"status-"+normalizeStatus(s).toLowerCase();}
function updateOrderStatus(i,v){const orders=loadOrders();if(!orders[i])return;orders[i].status=normalizeStatus(v);const r=JSON.stringify(orders);sessionStorage.setItem(ORDER_HISTORY_KEY,r);lastRawHistory=r;renderOrderHistory();}
function toggleOrderDetails(e,id){e.preventDefault();e.stopPropagation();const d=document.getElementById(id);if(d)d.open=!d.open;}
function escapeHtml(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");}

function renderOrderHistory(){
  const orders=loadOrders();
  if(orders.length===0){
    ordersContainer.innerHTML=`<div class="empty-state reveal animate-in"><span class="empty-icon">&#x1F354;</span><h3>No Orders Yet</h3><p>Your first order will show up right here. Head to the menu and get sizzling!</p><a href="menu.html" class="btn-primary" style="display:inline-flex;padding:0.8rem 2rem;font-size:1.1rem;text-decoration:none;">GO TO MENU</a></div>`;
    return;
  }
  const cards=[];
  for(let i=orders.length-1;i>=0;i--){
    const order=orders[i]||{};
    const items=Array.isArray(order.items)?order.items:[];
    const itemCount=items.reduce((s,it)=>s+Number(it.quantity||it.qty||0),0);
    const total=Number(order.total||0)>0?Number(order.total):calculateTotal(items);
    const status=normalizeStatus(order.status);
    const itemRows=items.map(it=>{
      const n=escapeHtml(it.item||it.name||"Unknown");const sz=escapeHtml(it.size||"-");
      const q=Number(it.quantity||it.qty||0);const p=formatPeso(it.price||0);const sub=formatPeso(Number(it.price||0)*q);
      return`<tr><td>${n}</td><td>${sz}</td><td>${q}</td><td>${p}</td><td>${sub}</td></tr>`;
    }).join("");
    const opts=ORDER_STATUSES.map(s=>`<option value="${s}"${s===status?" selected":""}>${s}</option>`).join("");
    cards.push(
      `<details class="order-card reveal animate-in" id="order-details-${i}">
        <summary>
          <div><div class="order-id">Order #${i+1}</div><div class="order-meta">${formatDate(order.date)}</div></div>
          <div><div class="order-meta">Items</div><div class="order-value">${itemCount}</div></div>
          <div><div class="order-meta">Total</div><div class="order-value">${formatPeso(total)}</div></div>
          <div class="right-actions">
            <span class="status-badge ${statusClass(status)}">${status}</span>
            <button type="button" class="card-action-btn" onclick="toggleOrderDetails(event,'order-details-${i}')">View Items</button>
          </div>
        </summary>
        <div class="order-items-wrap">
          <div class="order-items-header"><strong>Status</strong><select class="status-select" onchange="updateOrderStatus(${i},this.value)">${opts}</select></div>
          <table class="items-table"><thead><tr><th>Item</th><th>Size</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr></thead><tbody>${itemRows||"<tr><td colspan='5'>No items.</td></tr>"}</tbody></table>
        </div>
      </details>`
    );
  }
  ordersContainer.innerHTML=cards.join("");
}

function syncIfChanged(){const raw=sessionStorage.getItem(ORDER_HISTORY_KEY);if(raw!==lastRawHistory){lastRawHistory=raw;renderOrderHistory();}}
window.addEventListener("storage",e=>{if(e.key===ORDER_HISTORY_KEY){lastRawHistory=e.newValue;renderOrderHistory();}});
document.addEventListener("visibilitychange",()=>{if(!document.hidden)syncIfChanged();});
setInterval(syncIfChanged,1200);
syncIfChanged();
window.updateOrderStatus=updateOrderStatus;
window.toggleOrderDetails=toggleOrderDetails;
window.logoutAndResetHistory=logoutAndResetHistory;

const nav=document.getElementById('mainNav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>60),{passive:true});
document.querySelectorAll('.nav-links a').forEach(item=>{
  item.addEventListener('mousemove',e=>{const r=item.getBoundingClientRect();const x=(e.clientX-r.left)/r.width-0.5;const y=(e.clientY-r.top)/r.height-0.5;item.style.transition='none';item.style.transform=`perspective(600px) rotateX(${-y*14}deg) rotateY(${x*14}deg) scale(1.06)`;});
  item.addEventListener('mouseleave',()=>{item.style.transition='background 200ms var(--ease-out),transform 300ms var(--ease-out)';item.style.transform='';});
});
const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('animate-in');obs.unobserve(e.target);}}),{threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
