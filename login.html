<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up - Mimalicious</title>
  <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* Burger King Official Palette */
    :root {
      --red: #D62300;
      --yellow: #F5AF19;
      --beige: #F2EBD9;
      --brown: #502314;
      --white: #FFFFFF;
      --nike-ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Reset & Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    
    body { 
      background-color: var(--beige); 
      color: var(--brown); 
      font-family: 'Inter', sans-serif;
      display: flex; 
      flex-direction: column; 
      min-height: 100vh; 
    }
    
    h2, .logo, .submit-btn {
      font-family: 'Titan One', cursive;
      text-transform: uppercase;
    }

    /* --- Navigation Bar --- */
    .navbar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 1.2rem 8%; 
      background: var(--red); 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    
    .logo { 
      font-size: 2.2rem; 
      color: var(--yellow); 
      text-shadow: 2px 2px 0px var(--brown); 
      text-decoration: none;
    }
    
    .nav-button { 
      text-decoration: none; 
      background: var(--yellow); 
      color: var(--brown);
      padding: 0.7rem 2.2rem; 
      border-radius: 50px; 
      font-weight: 900; 
      font-size: 0.85rem; 
      transition: all 0.3s var(--nike-ease); 
      text-transform: uppercase;
      box-shadow: 0 4px 0px #C48D14;
    }
    
    .nav-button:hover { 
      background: var(--white); 
      transform: translateY(-2px);
      box-shadow: 0 4px 0px #ddd;
    }

    /* --- Centered Authentication Section --- */
    .auth-wrapper {
      flex: 1; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 4rem 5%; 
      background-color: var(--beige);
    }

    .auth-card {
      background: var(--white);
      width: 100%;
      max-width: 500px;
      padding: 3.5rem;
      border-radius: 40px;
      box-shadow: 0 25px 60px rgba(80, 35, 20, 0.15);
      text-align: center;
      border: 8px solid var(--white);
    }

    .auth-card h2 {
      font-size: 2.8rem;
      color: var(--red);
      margin-bottom: 0.8rem;
      text-shadow: 2px 2px 0px var(--yellow);
    }

    .auth-card p {
      color: var(--brown);
      font-size: 1.1rem;
      margin-bottom: 3rem;
      font-weight: 600;
      opacity: 0.8;
    }

    /* --- Form Fields --- */
    .form-group {
      text-align: left;
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.8rem;
      font-weight: 900;
      color: var(--brown);
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 1.2rem;
      border: 3px solid var(--beige);
      border-radius: 15px;
      background: #FAFAFA;
      font-size: 1.1rem;
      color: var(--brown);
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--yellow);
      background: var(--white);
    }

    /* --- Submit Button --- */
    .submit-btn {
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 1.2rem;
      font-size: 1.5rem;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
      transition: all 0.3s var(--nike-ease);
      box-shadow: 0 6px 0px #A01B00;
    }

    .submit-btn:hover {
      background: var(--yellow);
      color: var(--brown);
      transform: translateY(-3px);
      box-shadow: 0 6px 0px #C48D14;
    }

    @media (max-width: 600px) {
      .auth-card { padding: 2rem; }
      .auth-card h2 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<script>
  if (localStorage.getItem('loggedIn') === 'true') {
    window.location.href = 'home.html';
  }
</script>

<nav class="navbar">
  <div class="logo">MIMALICIOUS</div>
  <a class="nav-button" href="index.html">← Back</a>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Welcome!</h2>
    <p>Sign in to start your order</p>

    <form id="authForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="submit-btn">Login / Sign Up</button>
    </form>
  </div>
</div>

<script>
  document.getElementById('authForm').addEventListener('submit', function(event) {
    event.preventDefault();
    localStorage.setItem('loggedIn', 'true');
    window.location.href = 'home.html';
  });
</script>

</body>
</html>
